# Deploy to EC2 on push to main: build frontend, sync to server, restart app.
# No Docker. Requires GitHub secrets: EC2_HOST, EC2_SSH_KEY; optional: EC2_USER.

name: Deploy to EC2

on:
  push:
    branches: [deployment]
  workflow_dispatch: # allow manual run from Actions tab

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps and build
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Copy frontend build to backend/static
        run: |
          rm -rf backend/static
          cp -r frontend/dist backend/static

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          if [ -z "$EC2_HOST" ] || [ -z "$EC2_SSH_KEY" ]; then
            echo "EC2_HOST or EC2_SSH_KEY secret not set. Skipping deploy."
            exit 0
          fi
          USER="${EC2_USER:-ec2-user}"
          mkdir -p ~/.ssh
          # Normalize key: remove Windows CRLF so pasted .pem works
          printf '%s\n' "$EC2_SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          echo "Syncing project to EC2..."
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            --exclude 'backend/venv' \
            --exclude 'backend/.env' \
            --exclude 'frontend/node_modules' \
            --exclude '.git' \
            ./ "$USER@$EC2_HOST:~/AI-Interviewer-Matching/"

          echo "Restarting app on EC2..."
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new "$USER@$EC2_HOST" \
            "cd ~/AI-Interviewer-Matching && (pkill -f 'uvicorn app.main:app' || true); sleep 2; nohup bash run.sh >> app.log 2>&1 &"
          echo "Deploy done. App at http://$EC2_HOST:8000"
        continue-on-error: true  # so first push works before secrets are set
