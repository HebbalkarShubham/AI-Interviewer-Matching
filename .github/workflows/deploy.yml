# EC2 deployment: build frontend, sync to server, restart app (run.sh).
# Requires GitHub secrets: EC2_HOST, EC2_SSH_KEY (base64 of .pem); optional: EC2_USER.
# Optional: EC2_ENV_FILE = base64 of backend/.env (so S3 + SMTP work on EC2). See backend/.env.example.

name: Deploy to EC2

on:
  push:
    branches: [deployment]
  workflow_dispatch: # allow manual run from Actions tab

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          if [ -z "$EC2_HOST" ] || [ -z "$EC2_SSH_KEY" ]; then
            echo "::error::EC2_HOST or EC2_SSH_KEY not set. Skipping SSH test."
            exit 1
          fi
          USER="${EC2_USER:-ec2-user}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$EC2_SSH_KEY" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o ConnectTimeout=15 -o StrictHostKeyChecking=no "$USER@$EC2_HOST" "echo connected"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps and build
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Copy frontend build to backend/static
        run: |
          rm -rf backend/static
          cp -r frontend/dist backend/static

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_ENV_FILE: ${{ secrets.EC2_ENV_FILE }}
        run: |
          if [ -z "$EC2_HOST" ] || [ -z "$EC2_SSH_KEY" ]; then
            echo "::error::EC2_HOST or EC2_SSH_KEY secret not set."
            exit 1
          fi
          USER="${EC2_USER:-ec2-user}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # EC2_SSH_KEY = base64 of .pem (avoids newline/copy-paste issues). Decode and write key.
          echo "$EC2_SSH_KEY" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          echo "Testing SSH connection..."
          if ! ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o ConnectTimeout=15 -o StrictHostKeyChecking=accept-new "$USER@$EC2_HOST" "echo 'SSH OK'"; then
            echo "::error::SSH failed. Check: 1) EC2 Security Group allows inbound SSH (port 22) from 0.0.0.0/0 (GitHub IPs change). 2) EC2_SSH_KEY is the full .pem (BEGIN...END). 3) EC2_USER is correct (ec2-user for Amazon Linux, ubuntu for Ubuntu)."
            exit 1
          fi

          echo "Syncing project to EC2..."
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            --exclude 'backend/venv' \
            --exclude 'backend/.env' \
            --exclude 'frontend/node_modules' \
            --exclude '.git' \
            ./ "$USER@$EC2_HOST:~/AI-Interviewer-Matching/"

          if [ -n "$EC2_ENV_FILE" ]; then
            echo "Writing backend/.env on EC2 from EC2_ENV_FILE secret..."
            echo "$EC2_ENV_FILE" | base64 -d | ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new "$USER@$EC2_HOST" "cat > ~/AI-Interviewer-Matching/backend/.env"
            echo "backend/.env updated (S3, SMTP, etc. will be loaded)."
          else
            echo "::notice::EC2_ENV_FILE not set. S3 and email require backend/.env on EC2. Create it manually or add repo secret EC2_ENV_FILE (base64 of .env)."
          fi

          echo "Restarting app on EC2..."
          if ! ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new "$USER@$EC2_HOST" \
            "cd ~/AI-Interviewer-Matching && (pkill -f 'uvicorn app.main:app' || true); sleep 2; nohup bash run.sh >> app.log 2>&1 & sleep 1"; then
            echo "::warning::Restart command failed (exit 255). Code was synced. SSH to EC2 and run: cd AI-Interviewer-Matching && nohup bash run.sh >> app.log 2>&1 &"
          fi
          echo "Deploy done. App at http://$EC2_HOST:8000"
